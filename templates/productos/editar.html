{% extends 'base.html' %}

{% block title %}Editar Producto - Kiosco{% endblock %}

{% block content %}
<div class="card">
    <h2>Editar Producto</h2>
    
    <form method="POST" action="{{ url_for('productos.actualizar', id=producto.id) }}">
        <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" name="nombre" value="{{ producto.nombre }}" required>
        </div>
        
        <div class="form-group">
            <label>Código de Barras</label>
            <input type="text" value="{{ producto.codigo_barras }}" disabled>
            <small>El código no se puede modificar</small>
        </div>
        
        <div class="form-group">
            <label for="precio_venta">Precio de Venta *</label>
            <input type="number" id="precio_venta" name="precio_venta" step="0.01" value="{{ producto.precio_venta }}" required>
        </div>
        
        <div class="form-group">
            <label for="foto_path">Ruta de Foto</label>
            <input type="text" id="foto_path" name="foto_path" value="{{ producto.foto_path or '' }}">
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Guardar Cambios</button>
            <a href="{{ url_for('productos.index') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
