{% extends 'base.html' %}

{% block title %}Nuevo Producto - Kiosco{% endblock %}

{% block content %}
<div class="card">
    <h2>Nuevo Producto</h2>
    
    <form method="POST" action="{{ url_for('productos.crear') }}">
        <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        
        <div class="form-group">
            <label for="codigo_barras">Código de Barras *</label>
            <input type="text" id="codigo_barras" name="codigo_barras" required>
            <small>EAN-13 o código de fábrica</small>
        </div>
        
        <div class="form-group">
            <label for="codigo_tipo">Tipo de Código</label>
            <select id="codigo_tipo" name="codigo_tipo">
                <option value="externo">Externo (fábrica)</option>
                <option value="interno">Interno (generado)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="precio_venta">Precio de Venta *</label>
            <input type="number" id="precio_venta" name="precio_venta" step="0.01" required>
        </div>
        
        <div class="form-group">
            <label for="foto_path">Ruta de Foto</label>
            <input type="text" id="foto_path" name="foto_path" placeholder="imagenes/nombre.jpg">
        </div>
        
        <div class="actions">
            <button type="submit" class="btn btn-success">Guardar</button>
            <a href="{{ url_for('productos.index') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
